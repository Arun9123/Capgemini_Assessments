<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LMS - Registration</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
	<div class="card">
		<h2>Get Started</h2>
		<p class="subtitle">Join our learning community today</p>

		<form id="regForm">
			<div class="form-group">
				<label>Username</label> <input type="text" id="username"
					placeholder="johndoe123"> <span id="usernameError"
					class="error-msg"></span>
			</div>
			<div class="form-group">
				<label>Full Name</label> <input type="text" id="fullName"
					placeholder="John Doe"> <span id="fullNameError"
					class="error-msg"></span>
			</div>
			<div class="form-group">
				<label>Email Address</label> <input type="email" id="email"
					placeholder="name@example.com"> <span id="emailError"
					class="error-msg"></span>
			</div>
			<div class="form-group">
				<label>Password</label> <input type="password" id="password"
					placeholder="••••••••"> <span id="passwordError"
					class="error-msg"></span>
			</div>
			<div class="form-group">
				<label>Confirm Password</label> <input type="password"
					id="confirmPassword" placeholder="••••••••"> <span
					id="confirmError" class="error-msg"></span>
			</div>
			<button type="button" onclick="handleSignup()">Create
				Account</button>
		</form>

		<div class="footer-link">
			Already registered? <a href="login.html">Login here</a>
		</div>
	</div>
	<script src="js/script.js"></script>
</body>
</html>
